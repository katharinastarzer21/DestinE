name: Final Cookbook Deployment

on:
  issues:
    types: [closed]

jobs:
  deploy-final:
    if: contains(github.event.issue.labels.*.name, 'add-repo')
    runs-on: ubuntu-latest

    env:
      ALLOWED_USERS: "katharinastarzer21"

    steps:
      - name: Check if user is authorized
        run: |
          echo "Closed by: ${{ github.actor }}"
          if [[ ",${ALLOWED_USERS}," != *",${{ github.actor }},"* ]]; then
            echo "User ${{ github.actor }} is not allowed to deploy."
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyyaml

      - name: Save issue body
        run: echo "${{ github.event.issue.body }}" > issue_body.txt

      - name: Parse issue and update config
        run: python parse_issue.py
        env:
          GITHUB_ENV: ${{ github.env }}

      - name: Clone submitted cookbook
        run: git clone $REPO_URL submitted_repo

      - name: Prepare submitted repo
        run: |
          if [ -f submitted_repo/README.md ] && [ ! -f submitted_repo/index.md ]; then
            cp submitted_repo/README.md submitted_repo/index.md
          fi

      - name: Build cookbook and gallery
        run: |
          mkdir -p cookbooks/$ROOT_PATH
          sphinx-build -b html submitted_repo cookbooks/$ROOT_PATH -c docs
          sphinx-build -b html docs _site -c docs
          touch _site/.nojekyll

      - name: Backup final build
        run: |
          mkdir _deploy_temp
          cp notebook_gallery.yaml _deploy_temp/
          cp _site/index.html _deploy_temp/
          cp -r cookbooks/$ROOT_PATH _deploy_temp/

      - name: Prepare gh-pages
        run: |
          git fetch origin gh-pages
          git reset --hard
          git clean -fdx
          git switch gh-pages
          git pull

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Commit final cookbook to main
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add notebook_gallery.yaml cookbooks/$ROOT_PATH
          git commit -m "✅ Add final cookbook $ROOT_PATH (issue #${{ github.event.issue.number }})" || echo "No changes"
          git push origin main
