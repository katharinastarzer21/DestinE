name: MyST Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Promote cookbooks.json to main"]
    types: [completed]

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  build-and-deploy:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          pip install pyyaml nbformat
          npm install -g mystmd@v1.6.7

      - name: Sync notebooks from Lab + external cookbooks
        run: python scripts/clone_sync_repos.py

      - name: Debug notebook outputs (this notebook)
        run: |
          python - <<'PY'
          import json, pathlib
          nb = pathlib.Path("production/HDA/EUM_data/DEDL-HDA-EO.EUM.DAT.METOP.AVHRRL1.ipynb")  # <-- Pfad ggf. anpassen
          data = json.loads(nb.read_text(encoding="utf-8"))
          cells_with_outputs = sum(1 for c in data.get("cells", []) if c.get("outputs"))
          png = 0
          for c in data.get("cells", []):
            for o in c.get("outputs", []):
              d = o.get("data", {})
              if "image/png" in d:
                png += 1
          print("cells_with_outputs:", cells_with_outputs)
          print("png_outputs:", png)
          PY

      - name: Generate gallery markdown files
        run: python scripts/generate_gallery_md.py

      - name: Generate keywords markdown files
        run: python scripts/gallery_keywords.py

      - name: Generate Buttons in index file
        run: python scripts/indexbutton.py

      - name: Generate myst.yml and TOC
        run: python scripts/build_myst_yml.py

      - name: Build HTML Assets
        run: myst build --html
        env:
          BASE_URL: ${{ steps.pages.outputs.base_path }}

      - name: Show mystmd version
        run: myst --version

      - name: Debug deployment fingerprint
        run: |
          echo "BUILD_FINGERPRINT=$(date -u +%Y%m%d-%H%M%S)" >> _build/html/build_fingerprint.txt
          ls -la _build/html | head

      - name: Debug notebook outputs (this notebook)
        run: |
          python - <<'PY'
          import json, pathlib
          nb = pathlib.Path("production/HDA/EUM_data/DEDL-HDA-EO.EUM.DAT.METOP.AVHRRL1.ipynb")  # <-- Pfad ggf. anpassen
          data = json.loads(nb.read_text(encoding="utf-8"))
          cells_with_outputs = sum(1 for c in data.get("cells", []) if c.get("outputs"))
          png = 0
          for c in data.get("cells", []):
            for o in c.get("outputs", []):
              d = o.get("data", {})
              if "image/png" in d:
                png += 1
          print("cells_with_outputs:", cells_with_outputs)
          print("png_outputs:", png)
          PY

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
